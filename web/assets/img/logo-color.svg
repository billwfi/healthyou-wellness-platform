<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 72" fill="none">
  <!-- Three leaves fanned from stem base at (30,42) -->
  <!-- Left leaf -->
  <ellipse cx="30" cy="22" rx="6" ry="17" fill="#66bb6a"
           transform="rotate(-30,30,42)"/>
  <!-- Center leaf (tallest, darkest) -->
  <ellipse cx="30" cy="19" rx="6.5" ry="19" fill="#2e7d32"/>
  <!-- Right leaf (lightest) -->
  <ellipse cx="30" cy="22" rx="6" ry="17" fill="#8bc34a"
           transform="rotate(24,30,42)"/>
  <!-- Text -->
  <text x="30" y="62"
        text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
        font-size="13" font-weight="600" letter-spacing="0.2"
        fill="#1b5e20">Health</text>
  <text x="30" y="72"
        text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
        font-size="13" font-weight="300" letter-spacing="0.6"
        fill="#1b5e20">you</text>
</svg>
