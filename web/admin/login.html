<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — HealYou Admin</title>
  <link rel="stylesheet" href="/assets/css/style.css"/>
  <script src="/assets/auth.js"></script>
  <style>
    body { background: var(--teal); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card {
      background: #fff; border-radius: 12px; padding: 44px 40px; width: 100%;
      max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.25); text-align: center;
    }
    .login-card img { height: 48px; width: auto; margin-bottom: 20px; }
    .login-card h1 { font-size: 1.3rem; font-weight: 700; color: var(--gray-800); margin-bottom: 6px; }
    .login-card p.sub { font-size: .88rem; color: var(--gray-400); margin-bottom: 28px; }
    .login-card form { text-align: left; }
    .login-card .form-group { margin-bottom: 16px; }
    .login-card label { display:block; font-size:.82rem; font-weight:600; color:var(--gray-700); margin-bottom:6px; }
    .login-card input { width:100%; }
    #login-err { display:none; margin-bottom:16px; font-size:.85rem; color:var(--red); background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:10px 12px; text-align:left; }
    .pw-row { display:flex; align-items:center; gap:8px; font-size:.8rem; font-weight:400; color:var(--gray-500); margin-top:-6px; margin-bottom:16px; }
    .pw-row input { width:auto; }
  </style>
</head>
<body>
<div class="login-card">
  <img src="/assets/img/hylogo.png" alt="Healthyou"/>
  <h1>Admin Portal</h1>
  <p class="sub">Sign in to manage the wellness platform.</p>

  <div id="login-err"></div>

  <form id="login-form" onsubmit="return doLogin(event)">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" required autofocus/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required/>
    </div>
    <label class="pw-row"><input type="checkbox" id="showpw" onchange="document.getElementById('password').type=this.checked?'text':'password'"> Show password</label>
    <button class="btn btn-primary" style="width:100%;padding:12px;font-size:.95rem;" id="signin-btn" type="submit">Sign In</button>
  </form>
</div>

<script>
function nextUrl() {
  var n = new URLSearchParams(location.search).get('next');
  if (n && n.indexOf('/') === 0 && n.indexOf('//') !== 0) return n;
  return '/admin/';
}
// Already signed in? Skip straight to the dashboard.
if (window.hyAuth && hyAuth.getToken()) {
  var u = netlifyIdentity.currentUser();
  if (u) location.href = nextUrl();
}
function showErr(m) { var e = document.getElementById('login-err'); e.textContent = m; e.style.display = ''; }
async function doLogin(ev) {
  ev.preventDefault();
  var btn = document.getElementById('signin-btn');
  document.getElementById('login-err').style.display = 'none';
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  if (!email || !password) { showErr('Enter your email and password.'); return false; }
  btn.disabled = true; var label = btn.textContent; btn.textContent = 'Signing in…';
  try {
    var r = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password }),
    });
    var j = await r.json().catch(function () { return {}; });
    if (!r.ok || !j.token) { showErr(j.error || 'Sign in failed. Please try again.'); btn.disabled = false; btn.textContent = label; return false; }
    hyAuth.setToken(j.token);
    location.href = nextUrl();
  } catch (e) {
    showErr('Could not reach the server. Please try again.');
    btn.disabled = false; btn.textContent = label;
  }
  return false;
}
</script>
</body>
</html>
