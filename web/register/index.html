<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Register for Health Screening — HealYou</title>
  <link rel="stylesheet" href="/assets/css/style.css"/>
</head>
<body>
<header class="header">
  <a class="header-logo" href="/"><img src="/assets/img/hylogo.png" alt="Healthyou"></a>
</header>
<main class="container" style="padding-top:40px;">
  <div id="loading" style="text-align:center;padding:80px 0;color:var(--gray-400);">Loading event information…</div>

  <div id="event-error" style="display:none;text-align:center;padding:80px 20px;">
    <div style="font-size:2.5rem;margin-bottom:16px;">⚠️</div>
    <h2 id="err-title" style="margin-bottom:8px;">Event Not Found</h2>
    <p id="err-msg" style="color:var(--gray-400);">This registration link is invalid or the event no longer exists.</p>
  </div>

  <div id="form-container" style="display:none;max-width:560px;margin:0 auto;">
    <div style="text-align:center;margin-bottom:32px;">
      <h1 id="event-name" class="page-title" style="margin-bottom:6px;"></h1>
      <p id="event-meta" class="page-subtitle" style="margin-bottom:0;"></p>
    </div>
    <div class="card">
      <div class="card-title">Register for Biometric Screening</div>
      <div class="form-grid" style="gap:14px;">
        <div class="form-group"><label>First Name *</label><input id="f-first" type="text" placeholder="Jane" autocomplete="given-name"/></div>
        <div class="form-group"><label>Last Name *</label><input id="f-last" type="text" placeholder="Smith" autocomplete="family-name"/></div>
        <div class="form-group span-2"><label>Email Address *</label><input id="f-email" type="email" placeholder="jane@company.com" autocomplete="email"/></div>
        <div class="form-group"><label>Employee ID <span style="font-weight:400;color:var(--gray-400);">(optional)</span></label><input id="f-empid" type="text" placeholder="e.g. EMP-1234"/></div>
        <div class="form-group"><label>Department <span style="font-weight:400;color:var(--gray-400);">(optional)</span></label><input id="f-dept" type="text" placeholder="e.g. Operations"/></div>
        <div class="form-group"><label>Date of Birth <span style="font-weight:400;color:var(--gray-400);">(optional)</span></label><input id="f-dob" type="date"/></div>
        <div class="form-group"><label>Phone <span style="font-weight:400;color:var(--gray-400);">(optional)</span></label><input id="f-phone" type="tel" placeholder="(555) 555-5555" autocomplete="tel"/></div>
      </div>
      <div id="form-err" style="display:none;margin-top:12px;padding:10px 14px;background:var(--red-light);border-radius:var(--radius);font-size:.84rem;color:#991b1b;"></div>
      <div style="margin-top:20px;">
        <button class="btn btn-primary" style="width:100%;padding:12px;" id="submit-btn" onclick="submitReg()">Register for Screening</button>
      </div>
    </div>
  </div>

  <div id="success" style="display:none;text-align:center;padding:80px 20px;">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.8rem;">✓</div>
    <h2 style="color:var(--green);margin-bottom:8px;">You're registered!</h2>
    <p id="success-msg" style="color:var(--gray-400);max-width:400px;margin:0 auto;"></p>
  </div>
</main>
<script>
const eventId = new URLSearchParams(location.search).get('event');
let eventData = null;

async function init() {
  if (!eventId) { showError('No Event', 'Please use the registration link provided by your organization.'); return; }
  try {
    const r = await fetch(`/api/registration?event_id=${eventId}`);
    if (!r.ok) { showError('Event Not Found', 'This registration link is invalid or the event no longer exists.'); return; }
    eventData = await r.json();
    if (eventData.status === 'cancelled') {
      showError('Registration Closed', 'This screening event has been cancelled.');
      return;
    }
    if (eventData.status === 'completed') {
      showError('Event Completed', 'This screening event has already taken place.');
      return;
    }
    document.getElementById('event-name').textContent = eventData.name;
    const meta = [];
    if (eventData.event_date) meta.push(fmtDate(eventData.event_date));
    if (eventData.location) meta.push(eventData.location);
    if (eventData.org_name) meta.push(eventData.org_name);
    document.getElementById('event-meta').textContent = meta.join(' · ');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form-container').style.display = '';
  } catch(e) {
    showError('Error', 'Unable to load event information. Please try again.');
  }
}

function showError(title, msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('event-error').style.display = '';
}

async function submitReg() {
  const first = document.getElementById('f-first').value.trim();
  const last  = document.getElementById('f-last').value.trim();
  const email = document.getElementById('f-email').value.trim();
  if (!first || !last || !email) { showFormErr('First name, last name, and email are required.'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFormErr('Please enter a valid email address.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Registering…';
  document.getElementById('form-err').style.display = 'none';

  try {
    const r = await fetch('/api/registration', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        event_id: parseInt(eventId),
        first_name: first, last_name: last, email,
        employee_id: document.getElementById('f-empid').value || null,
        department:  document.getElementById('f-dept').value || null,
        date_of_birth: document.getElementById('f-dob').value || null,
        phone: document.getElementById('f-phone').value || null,
      })
    });
    if (!r.ok) {
      const err = await r.json();
      showFormErr(err.error || 'Registration failed. Please try again.');
      btn.disabled = false; btn.textContent = 'Register for Screening';
      return;
    }
    document.getElementById('form-container').style.display = 'none';
    document.getElementById('success').style.display = '';
    document.getElementById('success-msg').textContent =
      `Thank you, ${first}! You are registered for ${eventData.name}. We look forward to seeing you.`;
  } catch(e) {
    showFormErr('An error occurred. Please try again.');
    btn.disabled = false; btn.textContent = 'Register for Screening';
  }
}

function showFormErr(m) {
  const el = document.getElementById('form-err');
  el.textContent = m; el.style.display = '';
}

function fmtDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

init();
</script>
</body>
</html>
