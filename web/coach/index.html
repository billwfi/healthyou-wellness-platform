<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Coach Portal — HealthYou Wellness</title>
  <link rel="stylesheet" href="/assets/css/style.css"/>
  <script src="/assets/coach-auth.js"></script>
  <style>
    .cal-head { display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap; }
    .cal-title { font-size:1.15rem;font-weight:700;color:var(--gray-800);min-width:200px;text-align:center; }
    .cal-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--gray-200);border:1px solid var(--gray-200);border-radius:10px;overflow:hidden; }
    .cal-dow { background:var(--gray-100);text-align:center;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-500);padding:8px 4px; }
    .cal-cell { background:#fff;min-height:104px;padding:6px 6px 8px;display:flex;flex-direction:column;gap:3px; }
    .cal-cell.out { background:#fafafa; }
    .cal-daynum { font-size:.78rem;font-weight:600;color:var(--gray-500);align-self:flex-end;line-height:1; }
    .cal-cell.today .cal-daynum { background:var(--teal);color:#fff;border-radius:99px;width:20px;height:20px;display:flex;align-items:center;justify-content:center; }
    .appt-chip { text-align:left;border:none;width:100%;cursor:pointer;background:#e6f5f3;color:#0f766e;border-left:3px solid var(--teal);border-radius:4px;padding:3px 6px;font-size:.72rem;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .appt-chip.cancelled { background:var(--gray-100);color:var(--gray-400);border-left-color:var(--gray-300);text-decoration:line-through; }
    .appt-chip:hover { filter:brightness(.97); }
    .cal-more { font-size:.7rem;color:var(--gray-400);padding:0 6px; }
    @media (max-width:640px){ .cal-cell{min-height:72px;} .appt-chip{font-size:.66rem;} }
  </style>
</head>
<body>
<header class="header">
  <a class="header-logo" href="/coach/"><img src="/assets/img/hylogo-white.png" alt="HealthYou"></a>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="header-name" style="font-size:.85rem;opacity:.8;"></span>
    <span style="font-size:.75rem;opacity:.6;padding:2px 8px;border:1px solid rgba(255,255,255,.4);border-radius:99px;">Coach</span>
    <button class="btn btn-ghost btn-sm" id="logout-btn" style="display:none;background:transparent;color:#fff;border-color:rgba(255,255,255,.6);" onclick="logout()">Log Out</button>
  </div>
</header>

<main class="container">
  <!-- Sign-in wall -->
  <div id="login-wall" class="login-wall" style="max-width:420px;margin:40px auto;text-align:center;">
    <h2>Coach Portal</h2>
    <p style="color:var(--gray-500);">Enter your email and we'll send you a secure sign-in link.</p>
    <form id="login-form" onsubmit="return requestLink(event)" style="text-align:left;margin-top:18px;">
      <div class="form-group"><label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required placeholder="you@example.com"/>
      </div>
      <button class="btn btn-primary" id="link-btn" type="submit" style="width:100%;padding:12px;">Email me a sign-in link</button>
    </form>
    <div id="login-msg" style="display:none;margin-top:16px;font-size:.9rem;color:var(--teal);background:#e6f5f3;border-radius:8px;padding:12px 14px;text-align:left;"></div>
    <div id="login-err" style="display:none;margin-top:16px;font-size:.88rem;color:var(--red);background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;text-align:left;"></div>
  </div>

  <!-- Portal -->
  <div id="content" style="display:none;">
    <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;">
      <div>
        <h1 class="page-title" style="margin-bottom:2px;">My Appointments</h1>
        <p class="page-subtitle" id="subtitle"></p>
      </div>
      <div class="tabs" style="margin-bottom:0;border:none;gap:4px;">
        <button class="tab active" id="tab-calendar" onclick="switchView('calendar',this)">Calendar</button>
        <button class="tab" id="tab-list" onclick="switchView('list',this)">Caseload</button>
      </div>
    </div>

    <!-- Calendar view -->
    <div id="view-calendar" style="margin-top:16px;">
      <div class="cal-head">
        <div style="display:flex;gap:6px;">
          <button class="btn btn-ghost btn-sm" onclick="moveMonth(-1)">&#8249; Prev</button>
          <button class="btn btn-ghost btn-sm" onclick="goToday()">Today</button>
          <button class="btn btn-ghost btn-sm" onclick="moveMonth(1)">Next &#8250;</button>
        </div>
        <div class="cal-title" id="cal-title">—</div>
        <div style="min-width:120px;text-align:right;font-size:.82rem;color:var(--gray-400);" id="cal-count"></div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Caseload list view -->
    <div id="view-list" style="display:none;margin-top:16px;">
      <div class="search-bar" style="max-width:320px;margin-bottom:14px;"><input id="search" type="text" placeholder="Search participants…" oninput="renderList()"/></div>
      <div id="participant-list"></div>
    </div>
  </div>
</main>

<!-- Appointment detail modal -->
<div id="appt-modal" class="modal-backdrop" style="display:none;" onclick="closeApptOuter(event)">
  <div class="modal" style="max-width:420px;">
    <div class="modal-title" id="am-title">Appointment</div>
    <table style="width:100%;font-size:.9rem;margin-bottom:18px;">
      <tbody id="am-body"></tbody>
    </table>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAppt()">Close</button>
      <a class="btn btn-primary" id="am-open" href="#">Open participant</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
let coach=null, sessions=[], participants=[], listLoaded=false;
let viewYear, viewMonth; // month currently shown (viewMonth: 0-11)

// ── Boot / auth ───────────────────────────────────────────────────────────────
(async function init(){
  const url=new URL(location.href);
  const token=url.searchParams.get('token');
  if(token){
    // Exchange the magic-link token for a session token.
    try{
      const r=await fetch('/api/coach-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
      const d=await r.json();
      if(r.ok && d.token){ hyCoach.setToken(d.token); }
      else { showLoginErr(d.error||'This sign-in link is invalid or has expired. Please request a new one.'); }
    }catch(e){ showLoginErr('Could not verify your sign-in link. Please try again.'); }
    url.searchParams.delete('token');
    history.replaceState({}, '', url.pathname+url.search);
  }
  const c=hyCoach.claims();
  if(c){ boot(c); } else { showLogin(); }
})();

function showLogin(){ document.getElementById('login-wall').style.display=''; document.getElementById('content').style.display='none'; document.getElementById('logout-btn').style.display='none'; }
function showLoginErr(m){ const e=document.getElementById('login-err'); e.textContent=m; e.style.display=''; }
function logout(){ hyCoach.clearToken(); location.href='/coach/'; }

async function requestLink(ev){
  ev.preventDefault();
  const email=document.getElementById('email').value.trim();
  if(!email) return false;
  const btn=document.getElementById('link-btn'); btn.disabled=true; const label=btn.textContent; btn.textContent='Sending…';
  document.getElementById('login-err').style.display='none';
  try{
    await fetch('/api/coach-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const msg=document.getElementById('login-msg');
    msg.innerHTML='If <strong>'+esc(email)+'</strong> is a registered coach, a sign-in link is on its way. Check your inbox and click the link to continue. The link expires in 30 minutes.';
    msg.style.display='';
    document.getElementById('login-form').style.display='none';
  }catch(e){ showLoginErr('Could not send the link. Please try again.'); btn.disabled=false; btn.textContent=label; }
  return false;
}

function authHdr(){ return { Authorization:'Bearer '+hyCoach.getToken() }; }
async function apiGet(url){
  const r=await fetch(url,{headers:authHdr()});
  if(r.status===401){ hyCoach.clearToken(); showLogin(); throw new Error('Session expired'); }
  return r.json();
}

async function boot(c){
  coach=c;
  document.getElementById('login-wall').style.display='none';
  document.getElementById('content').style.display='';
  document.getElementById('logout-btn').style.display='';
  document.getElementById('header-name').textContent=c.full_name||c.email;
  document.getElementById('subtitle').textContent='Welcome back, '+(c.full_name||c.email);
  const now=new Date();
  viewYear=now.getUTCFullYear(); viewMonth=now.getUTCMonth();
  loadMonth();
}

// ── Month calendar ────────────────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function monthLabel(y,m){ return new Date(Date.UTC(y,m,1)).toLocaleDateString('en-US',{timeZone:'UTC',month:'long',year:'numeric'}); }
function moveMonth(delta){ viewMonth+=delta; if(viewMonth<0){viewMonth=11;viewYear--;} else if(viewMonth>11){viewMonth=0;viewYear++;} loadMonth(); }
function goToday(){ const n=new Date(); viewYear=n.getUTCFullYear(); viewMonth=n.getUTCMonth(); loadMonth(); }

async function loadMonth(){
  document.getElementById('cal-title').textContent=monthLabel(viewYear,viewMonth);
  const from=`${viewYear}-${pad(viewMonth+1)}-01`;
  const nextY=viewMonth===11?viewYear+1:viewYear, nextM=viewMonth===11?0:viewMonth+1;
  const to=`${nextY}-${pad(nextM+1)}-01`;
  document.getElementById('cal-grid').innerHTML='<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--gray-400);">Loading…</div>';
  try{
    sessions=await apiGet(`/api/sessions?coach_id=${coach.coach_id}&from=${from}&to=${to}`);
    if(!Array.isArray(sessions)) sessions=[];
    renderCalendar();
  }catch(e){ if(e.message!=='Session expired') document.getElementById('cal-grid').innerHTML='<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--red);">Failed to load appointments.</div>'; }
}

function apptTime(iso){ return new Date(iso).toLocaleTimeString('en-US',{timeZone:'UTC',hour:'numeric',minute:'2-digit'}); }
function utcKey(iso){ const d=new Date(iso); return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`; }

function renderCalendar(){
  document.getElementById('cal-count').textContent=sessions.length+' appt'+(sessions.length!==1?'s':'')+' this month';
  // Bucket appointments by UTC day.
  const byDay={};
  sessions.slice().sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at)).forEach(s=>{
    (byDay[utcKey(s.scheduled_at)] ||= []).push(s);
  });
  const first=new Date(Date.UTC(viewYear,viewMonth,1));
  const startDow=first.getUTCDay();
  const daysInMonth=new Date(Date.UTC(viewYear,viewMonth+1,0)).getUTCDate();
  const todayKey=utcKey(new Date().toISOString());

  const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html=DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  // Leading blanks from previous month
  const totalCells=Math.ceil((startDow+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    const dayNum=i-startDow+1;
    if(dayNum<1||dayNum>daysInMonth){ html+='<div class="cal-cell out"></div>'; continue; }
    const key=`${viewYear}-${pad(viewMonth+1)}-${pad(dayNum)}`;
    const appts=byDay[key]||[];
    const isToday=key===todayKey;
    const shown=appts.slice(0,3).map((s,idx)=>{
      const name=`${s.last_name||''}${s.first_name?', '+s.first_name[0]+'.':''}`.trim()||'Participant';
      const cls=(s.status==='cancelled'||s.status==='no_show')?'appt-chip cancelled':'appt-chip';
      const gi=sessions.indexOf(s);
      return `<button class="${cls}" onclick="openAppt(${gi})" title="${esc(apptTime(s.scheduled_at))} — ${esc(name)}">${esc(apptTime(s.scheduled_at))} ${esc(name)}</button>`;
    }).join('');
    const more=appts.length>3?`<div class="cal-more">+${appts.length-3} more</div>`:'';
    html+=`<div class="cal-cell${isToday?' today':''}"><div class="cal-daynum">${dayNum}</div>${shown}${more}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

// ── Appointment detail ────────────────────────────────────────────────────────
function openAppt(i){
  const s=sessions[i]; if(!s) return;
  const d=new Date(s.scheduled_at);
  const dateStr=d.toLocaleDateString('en-US',{timeZone:'UTC',weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const row=(l,v)=>`<tr><td style="padding:7px 0;color:var(--gray-400);width:110px;">${l}</td><td style="padding:7px 0;font-weight:600;color:var(--gray-800);">${v}</td></tr>`;
  document.getElementById('am-title').textContent=`${esc(s.first_name||'')} ${esc(s.last_name||'')}`.trim()||'Appointment';
  document.getElementById('am-body').innerHTML=
    row('Date',esc(dateStr))+
    row('Time',esc(apptTime(s.scheduled_at))+' &middot; '+(s.duration_minutes||60)+' min')+
    row('Type',esc(s.session_type||'session'))+
    row('Status',esc(s.status||'scheduled'))+
    (s.participant_email?row('Email',esc(s.participant_email)):'');
  const open=document.getElementById('am-open');
  if(s.participant_id){ open.style.display=''; open.href=`/coach/participant.html?id=${s.participant_id}`; }
  else open.style.display='none';
  document.getElementById('appt-modal').style.display='flex';
}
function closeAppt(){ document.getElementById('appt-modal').style.display='none'; }
function closeApptOuter(e){ if(e.target===document.getElementById('appt-modal')) closeAppt(); }

// ── Caseload list ─────────────────────────────────────────────────────────────
function switchView(view,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');
  document.getElementById('view-calendar').style.display=view==='calendar'?'':'none';
  document.getElementById('view-list').style.display=view==='list'?'':'none';
  if(view==='list' && !listLoaded){ loadCaseload(); }
}
async function loadCaseload(){
  listLoaded=true;
  document.getElementById('participant-list').innerHTML='<div class="empty">Loading…</div>';
  try{
    participants=await apiGet(`/api/participants?coach_id=${coach.coach_id}`);
    if(!Array.isArray(participants)) participants=[];
    renderList();
  }catch(e){ if(e.message!=='Session expired') document.getElementById('participant-list').innerHTML='<div class="empty">Failed to load caseload.</div>'; }
}
function renderList(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const rows=participants.filter(p=>{ if(!q) return true; return (`${p.first_name} ${p.last_name} ${p.email}`).toLowerCase().includes(q); });
  const el=document.getElementById('participant-list');
  if(!rows.length){ el.innerHTML='<div class="empty">No participants found.</div>'; return; }
  el.innerHTML=rows.map(p=>`<a href="/coach/participant.html?id=${p.id}" class="appt-row" style="display:grid;grid-template-columns:1fr auto;gap:12px;padding:14px 18px;text-decoration:none;color:inherit;">
      <div>
        <div style="font-weight:600;font-size:.95rem;">${esc(p.first_name)} ${esc(p.last_name)}</div>
        <div style="font-size:.82rem;color:var(--gray-400);margin-top:2px;">${esc(p.email)}${p.org_name?' &bull; '+esc(p.org_name):''}</div>
      </div>
      <span style="color:var(--gray-400);align-self:center;">&#8250;</span>
    </a>`).join('');
}

function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
function esc(s){ return (s==null?'':s.toString()).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body></html>
